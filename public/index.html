<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="manifest" href="/manifest.json"/>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#0f0f0f"/>
</head>
<body>
<div id="loading-screen">
    Loading...
</div>
<div id="chat-container">

    <section id="rooms-view" class="app-view">
        <div id="menu-page">
            <header id="menu-header">
                <div>
                    <p class="menu-kicker">Paruky Chat</p>
                    <h1>メニュー</h1>
                </div>
                <div id="user-bar"></div>
            </header>

            <nav id="menu-nav" aria-label="メニュー">
                <button id="rooms-nav-btn" type="button" class="menu-nav-item active">部屋</button>
                <button id="dms-nav-btn" type="button" class="menu-nav-item">DM</button>
                <button id="settings-nav-btn" type="button" class="menu-nav-item">設定</button>
            </nav>

            <section id="rooms-panel" class="menu-panel">
                <form id="room-form">
                    <input id="room" placeholder="部屋名">
                    <button id="join-btn" type="submit">入る</button>
                </form>

                <div class="menu-section-title">部屋一覧</div>
                <div id="room-list"></div>
            </section>

            <section id="dms-panel" class="menu-panel" hidden>
                <form id="dm-form">
                    <input id="dm-target" placeholder="相手のアカウント名">
                    <button id="dm-start-btn" type="submit">開く</button>
                </form>

                <div class="menu-section-title">DM</div>
                <div id="dm-list"></div>
            </section>

            <section id="settings-panel" class="menu-panel" hidden>
                <div class="menu-section-title">設定</div>

                <div class="settings-list">
                    <label class="setting-card setting-card-horizontal">
                        <span>
                            <span class="setting-title">未読バッジ</span>
                            <span class="setting-note">部屋一覧の赤い件数表示</span>
                        </span>
                        <span class="switch">
                            <input id="setting-unread-badges" type="checkbox">
                            <span class="switch-track"></span>
                        </span>
                    </label>

                    <div class="setting-card setting-card-horizontal notification-setting">
                        <span>
                            <span class="setting-title">通知</span>
                            <span id="notification-status" class="setting-note">通知の状態を確認中</span>
                        </span>
                        <button id="setting-notifications-btn" type="button" class="setting-action-btn">
                            通知をオンにする
                        </button>
                    </div>

                    <div class="setting-card">
                        <div class="setting-title">テーマ</div>
                        <div id="theme-options" class="theme-grid"></div>
                    </div>

                    <label class="setting-card setting-card-horizontal">
                        <span>
                            <span class="setting-title">コンパクト表示</span>
                            <span class="setting-note">部屋一覧とメッセージを少し詰める</span>
                        </span>
                        <span class="switch">
                            <input id="setting-compact-mode" type="checkbox">
                            <span class="switch-track"></span>
                        </span>
                    </label>

                    <div class="setting-card setting-card-horizontal">
                        <span>
                            <span class="setting-title">バージョン履歴</span>
                            <span class="setting-note">アップデートの記録</span>
                        </span>
                        <button id="version-history-btn" type="button" class="setting-action-btn">
                            開く
                        </button>
                    </div>
                </div>
            </section>

            <section id="version-history-panel" class="menu-panel" hidden>
                <div class="version-history-header">
                    <div>
                        <div class="menu-section-title">アップデートのお知らせ</div>
                        <h2>バージョン履歴</h2>
                    </div>
                    <button id="version-history-back-btn" type="button" class="setting-action-btn">
                        設定へ
                    </button>
                </div>

                <form id="version-history-form" class="version-history-form">
                    <input id="version-history-version" placeholder="Alpha 1.5">
                    <textarea
                        id="version-history-notes"
                        placeholder="変更内容"
                        rows="4"
                    ></textarea>
                    <div class="version-history-form-actions">
                        <button id="version-history-cancel-btn" type="button">
                            キャンセル
                        </button>
                        <button id="version-history-submit-btn" type="submit">
                            追加
                        </button>
                    </div>
                </form>

                <div id="version-history-list" class="version-history-list"></div>
            </section>
        </div>
    </section>

    <section id="chat-view" class="app-view" hidden>
        <div id="main-chat">

            <header id="chat-header">
                <button id="back-to-rooms-btn" type="button">メニュー</button>
                <div id="current-room-name">
                    未接続
                </div>
            </header>

            <div id="messages"></div>
            <div id="typing-indicator"></div>
            <button id="new-message-btn">
                ↓ 新着メッセージ
            </button>

            <form id="form">
                <div id="reply-composer" hidden>
                    <div>
                        <div id="reply-composer-label">返信先</div>
                        <div id="reply-composer-preview"></div>
                    </div>
                    <button id="reply-cancel-btn" type="button" aria-label="返信をキャンセル">
                        ×
                    </button>
                </div>

                <div class="composer-row">
                    <button
                        id="attachment-btn"
                        type="button"
                        aria-label="追加"
                        aria-haspopup="menu"
                        aria-expanded="false"
                    >
                        +
                    </button>

                    <div id="attachment-menu" role="menu" hidden>
                        <button id="photo-upload-btn" type="button" role="menuitem">
                            写真を送信
                        </button>
                        <button id="file-upload-btn" type="button" role="menuitem">
                            ファイルを送信
                        </button>
                    </div>

                    <input id="photo-input" type="file" accept="image/*" hidden>
                    <input id="file-input" type="file" hidden>

                    <button
                        id="canned-btn"
                        type="button"
                        aria-label="定型文"
                        aria-haspopup="menu"
                        aria-expanded="false"
                    >
                        定
                    </button>

                    <textarea
                        id="input"
                        placeholder="メッセージを入力"
                        rows="1"
                    ></textarea>

                    <button
                        id="send-btn"
                        type="submit"
                        aria-haspopup="menu"
                        aria-expanded="false"
                    >
                        送信
                    </button>
                </div>

                <div id="canned-menu" class="canned-menu" role="menu" hidden>
                    <div class="canned-menu-panel">
                        <div class="canned-menu-header">
                            <div>
                                <div class="canned-menu-kicker">Quick phrases</div>
                                <strong>定型文</strong>
                            </div>
                            <button id="canned-close-btn" type="button" aria-label="閉じる">
                                ×
                            </button>
                        </div>

                        <section class="canned-section">
                            <div class="canned-section-title">共通</div>
                            <div id="canned-preset-list" class="canned-list"></div>
                        </section>

                        <section class="canned-section">
                            <div class="canned-section-title">自分用</div>
                            <div id="canned-form" class="canned-form">
                                <input id="canned-input" placeholder="自分用定型文を追加">
                                <button id="canned-add-btn" type="button">追加</button>
                            </div>
                            <div id="canned-custom-list" class="canned-list canned-custom-list"></div>
                        </section>
                    </div>
                </div>

                <div id="effect-menu" class="effect-menu" role="menu" hidden>
                    <div class="effect-menu-panel">
                        <div class="effect-menu-header">
                            <div>
                                <div class="effect-menu-kicker">Send with effect</div>
                                <strong>エフェクトをつけて送信</strong>
                            </div>
                            <button id="effect-cancel-btn" type="button" aria-label="閉じる">
                                ×
                            </button>
                        </div>

                        <div class="effect-section">
                            <div class="effect-section-title">吹き出し</div>
                            <div class="effect-list">
                                <button type="button" role="menuitem" data-message-effect="slam">
                                    <span>スラム</span>
                                    <small>ドンと強く出る</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="loud">
                                    <span>ラウド</span>
                                    <small>大きく叫ぶ</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="gentle">
                                    <span>ジェントル</span>
                                    <small>ふわっと届く</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="invisible-ink">
                                    <span>見えないインク</span>
                                    <small>触るまで隠す</small>
                                </button>
                            </div>
                        </div>

                        <div class="effect-section">
                            <div class="effect-section-title">スクリーン</div>
                            <div class="effect-list">
                                <button type="button" role="menuitem" data-message-effect="echo">
                                    <span>エコー</span>
                                    <small>言葉を画面に反響</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="confetti">
                                    <span>紙吹雪</span>
                                    <small>カラフルに弾ける</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="fireworks">
                                    <span>花火</span>
                                    <small>光を打ち上げる</small>
                                </button>
                                <button type="button" role="menuitem" data-message-effect="spotlight">
                                    <span>スポットライト</span>
                                    <small>主役っぽく照らす</small>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

        </div>
    </section>

    <div id="app-version" aria-label="現在のバージョン"></div>

</div>



<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="js/app.mjs"></script>
</body>
</html>
