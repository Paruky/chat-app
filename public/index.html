<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="style.css">
    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js")
                .then((reg) => {
                    console.log("SW registered:", reg.scope);
                })
                .catch((err) => {
                    console.log("SW registration failed:", err);
                });
        });
    }
    </script>
</head>
<body>

<div id="chat-container">

    <div id="sidebar">
        <h3>部屋一覧</h3>
        <div id="room-list"></div>
    </div>

    <div id="main-chat">

        <div id="top-bar">
            <input id="room" placeholder="部屋名">
            <button id="join-btn" type="button">参加</button>
        </div>

        <div id="messages"></div>

        <form id="form">
            <input id="name" placeholder="名前を入力">
            <input id="input" autocomplete="off" placeholder="メッセージを入力">
            <button>送信</button>
        </form>

    </div>

</div>


<meta name="theme-color" content="#0f0f0f" />
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
<button onclick="enableNotifications()" style="
    position: fixed;
    bottom: 80px;
    right: 20px;
    padding: 10px;
    z-index: 9999;
    ">
    通知ON
</button>
<button id="installBtn" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 16px;
    background: #0f0f0f;
    color: white;
    border: 1px solid #333;
    border-radius: 12px;
    display: none;
    z-index: 9999;
    ">
    アプリをインストール</button>
<div id="iosHint" style="
    position: fixed;
    bottom: 70px;
    left: 10px;
    right: 10px;
    background: #111;
    color: white;
    padding: 10px;
    border-radius: 10px;
    display: none;
    z-index: 9999;
    font-size: 12px;
    ">
    iPhoneは「共有ボタン → ホーム画面に追加」でアプリ化できます
</div>
</body>
</html>
