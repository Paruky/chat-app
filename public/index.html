<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="manifest" href="/manifest.json"/>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#0f0f0f"/>
</head>
<body>
<div id="loading-screen">
    Loading...
</div>
<div id="chat-container">

    <section id="rooms-view" class="app-view">
        <div id="menu-page">
            <header id="menu-header">
                <div>
                    <p class="menu-kicker">Paruky Chat</p>
                    <h1>メニュー</h1>
                </div>
                <div id="user-bar"></div>
            </header>

            <nav id="menu-nav" aria-label="メニュー">
                <button id="rooms-nav-btn" type="button" class="menu-nav-item active">部屋</button>
                <button type="button" class="menu-nav-item" disabled>DM</button>
                <button id="settings-nav-btn" type="button" class="menu-nav-item">設定</button>
            </nav>

            <section id="rooms-panel" class="menu-panel">
                <form id="room-form">
                    <input id="room" placeholder="部屋名">
                    <button id="join-btn" type="submit">入る</button>
                </form>

                <div class="menu-section-title">部屋一覧</div>
                <div id="room-list"></div>
            </section>

            <section id="settings-panel" class="menu-panel" hidden>
                <div class="menu-section-title">設定</div>

                <div class="settings-list">
                    <label class="setting-card setting-card-horizontal">
                        <span>
                            <span class="setting-title">未読バッジ</span>
                            <span class="setting-note">部屋一覧の赤い件数表示</span>
                        </span>
                        <span class="switch">
                            <input id="setting-unread-badges" type="checkbox">
                            <span class="switch-track"></span>
                        </span>
                    </label>

                    <div class="setting-card">
                        <div class="setting-title">テーマ</div>
                        <div id="theme-options" class="theme-grid"></div>
                    </div>

                    <label class="setting-card setting-card-horizontal">
                        <span>
                            <span class="setting-title">コンパクト表示</span>
                            <span class="setting-note">部屋一覧とメッセージを少し詰める</span>
                        </span>
                        <span class="switch">
                            <input id="setting-compact-mode" type="checkbox">
                            <span class="switch-track"></span>
                        </span>
                    </label>
                </div>
            </section>
        </div>
    </section>

    <section id="chat-view" class="app-view" hidden>
        <div id="main-chat">

            <header id="chat-header">
                <button id="back-to-rooms-btn" type="button">メニュー</button>
                <div id="current-room-name">
                    未接続
                </div>
            </header>

            <div id="messages"></div>
            <div id="typing-indicator"></div>
            <button id="new-message-btn">
                ↓ 新着メッセージ
            </button>

            <form id="form">
                <textarea
                    id="input"
                    placeholder="メッセージを入力"
                    rows="1"
                ></textarea>

                <button type="submit">
                    送信
                </button>
            </form>

        </div>
    </section>

    <div id="app-version" aria-label="現在のバージョン"></div>

</div>



<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="js/app.mjs"></script>
</body>
</html>
